<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Ejercicio posicionamiento float</title>
<style type="text/css">
  /* Estilos para el contenedor */
  div {
    background-color: #E4E4E4; /* Fondo gris */
    padding: 10px 15px;        /* Espaciado interno */
    overflow: hidden;          /* Evita que el contenedor colapse por los floats */
    font-family: Arial, sans-serif; /* Fuente similar a la de la imagen */
  }

  /* Clases para flotar el texto */
  .anterior {
    float: left;
  }

  .siguiente {
    float: right;
  }
</style>
</head>

<body>
  <div>
    <span class="anterior">&laquo; Anterior</span>
    <span class="siguiente">Siguiente &raquo;</span>
  </div>
</body>
</html>
